services:
  app:
    image: ghcr.io/briandenicola/ancient-coins:latest
    environment:
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env (min 32 chars)}
      - DB_PATH=/app/data/ancientcoins.db
      - PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - db-data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  db-data:
  uploads:
