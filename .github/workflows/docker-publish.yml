name: Build and Push to Docker Hub

on:
  workflow_run:
    workflows: [Quality Gate]
    branches: [main]
    types: [completed]

env:
  IMAGE_APP: ${{ secrets.DOCKERHUB_USERNAME }}/ancient-coins
  IMAGE_AGENT: ${{ secrets.DOCKERHUB_USERNAME }}/ancient-coins-agent

jobs:
  build-and-push-app:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: tags
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          short_sha="${HEAD_SHA::7}"
          echo "tags=${IMAGE_APP}:sha-${HEAD_SHA},${IMAGE_APP}:sha-${short_sha},${IMAGE_APP}:latest" >> "$GITHUB_OUTPUT"

      - name: Set build date
        id: date
        run: echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push app
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            APP_VERSION=${{ github.event.workflow_run.head_sha }}
            BUILD_DATE=${{ steps.date.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-agent:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: tags
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          short_sha="${HEAD_SHA::7}"
          echo "tags=${IMAGE_AGENT}:sha-${HEAD_SHA},${IMAGE_AGENT}:sha-${short_sha},${IMAGE_AGENT}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push agent
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: src/agent
          file: src/agent/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
