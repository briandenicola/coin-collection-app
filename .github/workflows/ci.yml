name: Quality Gate

on:
  pull_request:
    branches: [main, beta]
  push:
    branches: [main, beta]

permissions:
  contents: read

jobs:
  go-api:
    name: Go API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/api
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: src/api/go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v ./...

      - name: Verify OpenAPI snapshot
        shell: bash
        run: |
          go install github.com/swaggo/swag/cmd/swag@v1.16.6
          "$(go env GOPATH)/bin/swag" init -g main.go -o ./docs --parseDependency --parseInternal
          cp docs/swagger.json ../../docs/openapi.json

          if ! git diff --exit-code -- docs/docs.go docs/swagger.json docs/swagger.yaml ../../docs/openapi.json; then
            echo "docs/openapi.json is out of sync — run 'task openapi' and commit the result"
            git --no-pager diff -- docs/docs.go docs/swagger.json docs/swagger.yaml ../../docs/openapi.json
            exit 1
          fi

  vue-web:
    name: Vue Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: src/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No lint script defined; skipping."
          fi

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

  python-agent:
    name: Python Agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/agent
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv==0.11.22
          uv sync --locked --extra dev

      - name: Lint
        run: uv run ruff check app/ tests/

      - name: Tests
        run: uv run pytest tests/ -v
