linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gocritic
    - gofmt
    - misspell

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
    disabled-checks:
      - hugeParam
  misspell:
    locale: US

issues:
  exclude-dirs:
    - docs
  max-issues-per-linter: 50
  max-same-issues: 5

run:
  timeout: 5m
