        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get admin collection health summary
      tags:
      - Admin
  /admin/logs:
    get:
      description: Returns recent in-memory application logs, optionally filtered
        by level. Admin only.
      parameters:
      - default: 500
        description: Maximum number of log entries
        in: query
        name: limit
        type: integer
      - description: Filter by log level
        enum:
        - trace
        - debug
        - info
        - warn
        - error
        in: query
        name: level
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.LogsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
