        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete catalog
      tags:
      - Catalogs
    put:
      consumes:
      - application/json
      description: Updates an existing catalog registry entry.
      parameters:
      - description: Catalog ID
        in: path
        name: id
        required: true
        type: integer
      - description: Catalog data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.catalogUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.CatalogRegistry'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update catalog
      tags:
      - Catalogs
  /admin/coin-of-day/run:
    post:
      description: Picks one coin per opted-in user and sends notifications. Runs
        synchronously.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Trigger manual coin-of-the-day pick
      tags:
      - Admin
  /admin/collection-health-snapshots/run:
    post:
      description: Manually persists collection health snapshots for all users with
        eligible coins. Runs synchronously. Admin only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Trigger manual collection health snapshots
      tags:
      - Admin
  /admin/health/summary:
    get:
      description: Returns aggregate collection health metrics across all users. Admin
        only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
