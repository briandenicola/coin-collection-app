      tags:
      - Images
  /stats:
    get:
      description: Returns counts by category/material, total/average values, and
        wishlist count.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.StatsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get collection statistics
      tags:
      - Coins
  /suggestions:
    get:
      description: Returns distinct values for the specified field, optionally filtered
        by a search query. Limited to 20 results.
      parameters:
      - description: Field to get suggestions for
        enum:
        - name
        - denomination
        - purchaseLocation
        in: query
        name: field
        required: true
        type: string
      - description: Search filter
        in: query
        name: q
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
