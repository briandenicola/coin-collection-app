          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Extract text from image
      tags:
      - Analysis
  /ollama-status:
    get:
      description: Returns whether the configured Ollama instance is reachable and
        the model is available.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.OllamaStatusResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Check Ollama status
      tags:
      - Analysis
  /proxy-image:
    get:
      description: Fetches an image from an external URL and streams it to the client.
        Limited to 20MB. Only http/https URLs with image content types are allowed.
      parameters:
      - description: External image URL
        in: query
        name: url
        required: true
        type: string
      produces:
      - image/*
      responses:
        "200":
          description: Image binary data
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
