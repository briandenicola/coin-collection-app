        type: integer
      - description: Which side's analysis to clear
        enum:
        - obverse
        - reverse
        in: query
        name: side
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.DeleteAnalysisResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete coin analysis
      tags:
      - Analysis
    post:
      description: Sends coin images to Ollama for AI-powered analysis. Can analyze
        a specific side (obverse/reverse) or all images.
      parameters:
      - description: Coin ID
        in: path
        name: id
        required: true
        type: integer
      - description: Analyze a specific side only
        enum:
        - obverse
        - reverse
        in: query
        name: side
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AnalysisResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Analyze coin images
      tags:
      - Analysis
  /coins/{id}/images:
    post:
      consumes:
      - multipart/form-data
      description: Upload an image file for a specific coin. Supports setting image
        type and primary flag.
      parameters:
      - description: Coin ID
        in: path
        name: id
        required: true
        type: integer
      - description: Image file
        in: formData
        name: image
        required: true
        type: file
      - default: other
        description: Image type
        enum:
        - obverse
        - reverse
        - detail
        - other
        in: formData
        name: imageType
        type: string
      - default: "false"
        description: Set as primary image
        enum:
        - "true"
        - "false"
        in: formData
        name: isPrimary
        type: string
      produces:
      - application/json
      responses:
        "201":
