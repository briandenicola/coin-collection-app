basePath: /api
definitions:
  handlers.AnalysisResponse:
    properties:
      analysis:
        example: This coin appears to be a Roman denarius...
        type: string
      coin:
        $ref: '#/definitions/models.Coin'
      side:
        example: obverse
        type: string
    type: object
  handlers.AuthResponse:
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
      user:
        $ref: '#/definitions/handlers.AuthUserInfo'
    type: object
  handlers.AuthUserInfo:
    properties:
      id:
        example: 1
        type: integer
      role:
        example: admin
        type: string
      username:
        example: admin
        type: string
    type: object
  handlers.CategoryCount:
    properties:
      category:
        example: Roman
        type: string
      count:
        example: 10
        type: integer
    type: object
  handlers.ChangePasswordRequest:
    properties:
      currentPassword:
        example: oldpass123
        type: string
      newPassword:
        example: newpass456
        minLength: 6
        type: string
    required:
    - currentPassword
    - newPassword
    type: object
  handlers.CoinDeletedResponse:
    properties:
      message:
        example: Coin deleted
        type: string
    type: object
  handlers.CoinListResponse:
    properties:
      coins:
        items:
          $ref: '#/definitions/models.Coin'
        type: array
      limit:
        example: 50
        type: integer
      page:
        example: 1
        type: integer
      total:
        example: 42
        type: integer
    type: object
  handlers.DeleteAnalysisResponse:
    properties:
      coin:
        $ref: '#/definitions/models.Coin'
    type: object
  handlers.ErrorResponse:
    properties:
      error:
        example: Something went wrong
        type: string
    type: object
  handlers.ExtractTextResponse:
    properties:
      text:
        example: CAESAR AVGVSTVS
        type: string
    type: object
  handlers.ImageDeletedResponse:
    properties:
      message:
        example: Image deleted
        type: string
    type: object
  handlers.ImportResponse:
    properties:
      imported:
        example: 10
        type: integer
      message:
        example: Import complete
        type: string
    type: object
  handlers.LogEntry:
    properties:
      level:
        example: info
        type: string
      message:
        example: Application starting
        type: string
      timestamp:
        example: "2025-01-01T12:00:00Z"
        type: string
    type: object
  handlers.LogsResponse:
    properties:
      count:
        example: 100
        type: integer
      logLevel:
        example: info
        type: string
      logs:
        items:
          $ref: '#/definitions/handlers.LogEntry'
        type: array
    type: object
  handlers.MaterialCount:
    properties:
      count:
        example: 8
        type: integer
      material:
        example: Silver
        type: string
    type: object
  handlers.MessageResponse:
    properties:
      message:
        example: Operation successful
        type: string
    type: object
  handlers.OllamaStatusResponse:
    properties:
      available:
        example: true
        type: boolean
      message:
        example: Model llava is available
        type: string
      model:
        example: llava
        type: string
      url:
        example: http://localhost:11434
        type: string
    type: object
  handlers.PasswordChangedResponse:
    properties:
      message:
        example: Password changed
        type: string
    type: object
  handlers.ResetPasswordRequest:
    properties:
      newPassword:
        example: newpass456
        minLength: 6
        type: string
    required:
    - newPassword
    type: object
  handlers.SettingInput:
    properties:
      key:
        example: OllamaURL
        type: string
      value:
        example: http://localhost:11434
        type: string
    type: object
  handlers.SettingsUpdateResponse:
    properties:
      message:
        example: Settings updated
        type: string
    type: object
  handlers.SetupResponse:
    properties:
      needsSetup:
        example: false
        type: boolean
    type: object
  handlers.StatsResponse:
    properties:
      byCategory:
        items:
          $ref: '#/definitions/handlers.CategoryCount'
        type: array
      byMaterial:
        items:
          $ref: '#/definitions/handlers.MaterialCount'
        type: array
      totalCoins:
        example: 25
        type: integer
      totalWishlist:
        example: 5
        type: integer
      values:
        $ref: '#/definitions/handlers.ValueSummary'
    type: object
  handlers.UserDTO:
    properties:
      createdAt:
        example: "2025-01-01T00:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      role:
        allOf:
        - $ref: '#/definitions/models.UserRole'
        example: admin
      username:
        example: admin
        type: string
    type: object
  handlers.UserInfoResponse:
    properties:
      createdAt:
        example: "2025-01-01T00:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      role:
        example: admin
        type: string
      username:
        example: admin
        type: string
    type: object
  handlers.ValueSummary:
    properties:
      avgCurrentValue:
        example: 100
        type: number
      avgPurchasePrice:
        example: 50
        type: number
      totalCurrentValue:
        example: 2500
        type: number
      totalPurchasePrice:
        example: 1250
        type: number
    type: object
  handlers.base64ImageRequest:
    properties:
      fileExtension:
        example: .jpg
        type: string
      image:
        example: /9j/4AAQSkZJRgABAQ...
        type: string
      imageType:
        example: obverse
        type: string
      isPrimary:
        example: false
        type: boolean
    required:
    - fileExtension
    - image
    type: object
  handlers.generateApiKeyRequest:
    properties:
      name:
        example: My Script
        type: string
    required:
    - name
    type: object
  handlers.generateApiKeyResponse:
    properties:
      apiKey:
        $ref: '#/definitions/models.ApiKey'
      key:
        example: ak_a1b2c3d4e5f6...
        type: string
    type: object
  handlers.loginRequest:
    properties:
      password:
        example: password123
        type: string
      username:
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  handlers.registerRequest:
    properties:
      password:
        example: password123
        minLength: 6
        type: string
      username:
        example: admin
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  models.ApiKey:
    properties:
      createdAt:
        type: string
      id:
        type: integer
      keyPrefix:
        type: string
      lastUsedAt:
        type: string
      name:
        type: string
      revokedAt:
        type: string
      userId:
        type: integer
    type: object
  models.Category:
    enum:
    - Roman
    - Greek
    - Byzantine
    - Modern
    - Other
    type: string
    x-enum-varnames:
    - CategoryRoman
    - CategoryGreek
    - CategoryByzantine
    - CategoryModern
    - CategoryOther
  models.Coin:
    properties:
      aiAnalysis:
        type: string
      category:
        $ref: '#/definitions/models.Category'
      createdAt:
        type: string
      currentValue:
        type: number
      denomination:
        type: string
      diameterMm:
        type: number
      era:
        type: string
      grade:
        type: string
      id:
        type: integer
      images:
        items:
          $ref: '#/definitions/models.CoinImage'
        type: array
      isWishlist:
        type: boolean
      material:
        $ref: '#/definitions/models.Material'
      mint:
        type: string
      name:
        type: string
      notes:
        type: string
      obverseAnalysis:
        type: string
      obverseDescription:
        type: string
      obverseInscription:
        type: string
      purchaseDate:
        type: string
      purchaseLocation:
        type: string
      purchasePrice:
        type: number
      rarityRating:
        type: string
      referenceText:
        type: string
      referenceUrl:
        type: string
      reverseAnalysis:
        type: string
      reverseDescription:
        type: string
      reverseInscription:
        type: string
      ruler:
        type: string
      updatedAt:
        type: string
      userId:
        type: integer
      weightGrams:
        type: number
    type: object
  models.CoinImage:
    properties:
      coinId:
        type: integer
      createdAt:
        type: string
      filePath:
        type: string
      id:
        type: integer
      imageType:
        $ref: '#/definitions/models.ImageType'
      isPrimary:
        type: boolean
    type: object
  models.ImageType:
    enum:
    - obverse
    - reverse
    - detail
    - other
    type: string
    x-enum-varnames:
    - ImageTypeObverse
    - ImageTypeReverse
    - ImageTypeDetail
    - ImageTypeOther
  models.Material:
    enum:
    - Gold
    - Silver
    - Bronze
    - Copper
    - Electrum
    - Other
    type: string
    x-enum-varnames:
    - MaterialGold
    - MaterialSilver
    - MaterialBronze
    - MaterialCopper
    - MaterialElectrum
    - MaterialOther
  models.UserRole:
    enum:
    - admin
    - user
    type: string
    x-enum-varnames:
    - RoleAdmin
    - RoleUser
info:
  contact: {}
  description: REST API for managing an ancient coin collection. Supports coin CRUD,
    image uploads, AI-powered analysis via Ollama, user management, and admin features.
  title: Ancient Coins API
  version: "1.0"
paths:
  /admin/logs:
    get:
      description: Returns recent in-memory application logs, optionally filtered
        by level. Admin only.
      parameters:
      - default: 500
        description: Maximum number of log entries
        in: query
        name: limit
        type: integer
      - description: Filter by log level
        enum:
        - trace
        - debug
        - info
        - warn
        - error
        in: query
        name: level
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.LogsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get application logs
      tags:
      - Admin
  /admin/settings:
    get:
      description: Returns all application settings merged with defaults. Admin only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get application settings
      tags:
      - Admin
    put:
      consumes:
      - application/json
      description: Updates one or more application settings. Syncs log level if changed.
        Admin only.
      parameters:
      - description: Settings to update
        in: body
        name: body
        required: true
        schema:
          items:
            $ref: '#/definitions/handlers.SettingInput'
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.SettingsUpdateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update application settings
      tags:
      - Admin
  /admin/settings/defaults:
    get:
      description: Returns the built-in default values for all application settings.
        Admin only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get setting defaults
      tags:
      - Admin
  /admin/users:
    get:
      description: Returns a list of all registered users. Admin only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.UserDTO'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all users
      tags:
      - Admin
  /admin/users/{id}:
    delete:
      description: Deletes a user and all their associated coins and images. Cannot
        delete yourself. Admin only.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a user
      tags:
      - Admin
  /admin/users/{id}/reset-password:
    post:
      consumes:
      - application/json
      description: Sets a new password for the specified user. Admin only.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: New password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Reset user password
      tags:
      - Admin
  /auth/api-keys:
    get:
      description: Returns all API keys for the authenticated user. Key values are
        not included, only metadata.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.ApiKey'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List API keys
      tags:
      - API Keys
    post:
      consumes:
      - application/json
      description: Creates a new API key. The key is returned once and cannot be retrieved
        again.
      parameters:
      - description: Key name for identification
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.generateApiKeyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.generateApiKeyResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Generate an API key
      tags:
      - API Keys
  /auth/api-keys/{id}:
    delete:
      description: Revokes an API key so it can no longer be used for authentication.
      parameters:
      - description: API Key ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Revoke an API key
      tags:
      - API Keys
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Change the authenticated user's password. Requires the current
        password for verification.
      parameters:
      - description: Password change request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.PasswordChangedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - User
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with username and password to receive a JWT token.
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Login
      tags:
      - Auth
  /auth/me:
    get:
      description: Returns profile information for the authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.UserInfoResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - User
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account. The first registered user is assigned
        the admin role.
      parameters:
      - description: Registration credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Register a new user
      tags:
      - Auth
  /auth/setup:
    get:
      description: Returns whether the application needs initial setup (no users exist
        yet).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.SetupResponse'
      summary: Check setup status
      tags:
      - Auth
  /coins:
    get:
      description: Returns a paginated, filterable list of coins belonging to the
        authenticated user.
      parameters:
      - description: Filter by category (Roman, Greek, Byzantine, Modern, Other)
        in: query
        name: category
        type: string
      - description: Search across name, denomination, ruler, era, mint, inscriptions,
          notes
        in: query
        name: search
        type: string
      - description: Filter by wishlist status
        enum:
        - "true"
        - "false"
        in: query
        name: wishlist
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 50
        description: Items per page (max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.CoinListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List coins
      tags:
      - Coins
    post:
      consumes:
      - application/json
      description: Creates a new coin record for the authenticated user.
      parameters:
      - description: Coin data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.Coin'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Coin'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a coin
      tags:
      - Coins
  /coins/{id}:
    delete:
      description: Deletes a coin and all associated image records. Only the coin
        owner can delete it.
      parameters:
      - description: Coin ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.CoinDeletedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a coin
      tags:
      - Coins
    get:
      description: Returns a single coin with its images, owned by the authenticated
        user.
      parameters:
      - description: Coin ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Coin'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
