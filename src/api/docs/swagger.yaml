      - Images
  /coins/{id}/images/base64:
    post:
      consumes:
      - application/json
      description: Upload a raw base64-encoded image for a specific coin. The image
        field must contain only raw base64 data (no data URI prefix). The fileExtension
        field (e.g. ".jpg", ".png") tells the API how to save the file. Max 20MB decoded.
      parameters:
      - description: Coin ID
        in: path
        name: id
        required: true
        type: integer
      - description: Base64 image data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.base64ImageRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.CoinImage'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      summary: Upload a coin image (base64)
      tags:
      - Images
  /extract-text:
    post:
      consumes:
      - multipart/form-data
      description: Uploads an image and uses Ollama to extract visible text (e.g.,
        coin inscriptions).
