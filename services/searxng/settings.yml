# SearXNG configuration for Ancient Coins agent service
# Used only when LLM provider is Ollama (Claude uses built-in web_search)

use_default_settings: true

server:
  secret_key: "change-me-in-production"
  bind_address: "0.0.0.0"
  port: 8888
  limiter: false

search:
  safe_search: 0
  default_lang: "en"
  formats:
    - html
    - json

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

ui:
  static_use_hash: true
