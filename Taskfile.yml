version: '3'

env:
  DOCKER_REPO: bjd145

tasks:
  default:
  cmds:
    - task --list
  
  up:
    desc: Run both API and web servers in parallel
    deps:
      - run-api
      - run-web
    silent: true

  build-api:
    desc: Build the Go API
    dir: src/api
    cmds:
      - go build -o ancient-coins-api .

  build-web:
    desc: Build the Vue frontend
    dir: src/web
    cmds:
      - npm install
      - npm run build

  run-api:
    desc: Run the Go API server
    dir: src/api
    dotenv: ['../../.env']
    cmds:
      - go run .
    env:
      DB_PATH: ./ancientcoins.db

  run-web:
    desc: Run the Vite dev server
    dir: src/web
    cmds:
      - npm install
      - npm run dev

  build:
    desc: Build both API and web
    deps:
      - build-api
      - build-web

  test:
    desc: Run Go architecture and unit tests
    dir: src/api
    cmds:
      - go test -v ./...

  build-agent:
    desc: Build the Python agent service
    dir: src/agent
    cmds:
      - pip install -e ".[dev]"

  run-agent:
    desc: Run the Python agent dev server
    dir: src/agent
    cmds:
      - uvicorn app.main:app --host 0.0.0.0 --port 8081 --reload

  test-agent:
    desc: Run Python agent tests
    dir: src/agent
    cmds:
      - python -m pytest tests/ -v

  lint-agent:
    desc: Lint Python agent code
    dir: src/agent
    cmds:
      - ruff check app/ tests/

  up-all:
    desc: Run API, web, and agent servers in parallel
    deps:
      - run-api
      - run-web
      - run-agent
    silent: true

  run:
    desc: Run both API and web servers in parallel
    deps:
      - run-api
      - run-web
    silent: true

  docker-build:
    desc: Build the Docker container image
    vars:
      COMMIT_SHA:
        sh: git rev-parse --short HEAD
      BUILD_DATE:
        sh: date -u +"%Y-%m-%dT%H:%M:%SZ"
    cmds:
      - docker build
        --build-arg APP_VERSION={{.COMMIT_SHA}}
        --build-arg BUILD_DATE={{.BUILD_DATE}}
        -t {{.DOCKER_REPO}}/ancient-coins:{{.COMMIT_SHA}}
        -t {{.DOCKER_REPO}}/ancient-coins:latest .

  docker-run:
    desc: Run the Docker container locally
    dotenv: ['.env']
    vars:
      COMMIT_SHA:
        sh: git rev-parse --short HEAD
    cmds:
      - docker stop ancient-coins && docker rm ancient-coins || true
      - docker run -p 8080:8080 -d
        -e JWT_SECRET=${JWT_SECRET}
        -v ancient-coins-data:/app/data
        -v ancient-coins-uploads:/app/uploads
        --name ancient-coins
        {{.DOCKER_REPO}}/ancient-coins:{{.COMMIT_SHA}}

  init:
    desc: Generate a .env file with a random JWT secret
    status:
      - test -f .env
    cmds:
      - |
        cat > .env <<EOF
        JWT_SECRET=$(openssl rand -base64 48)
        EOF
      - echo ".env file created with a generated JWT secret."
